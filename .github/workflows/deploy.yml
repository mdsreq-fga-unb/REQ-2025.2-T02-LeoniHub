# deploy.yml

name: Deploy Docusaurus to GitHub Pages

on:
  # Dispara a ação toda vez que você fizer um push para a branch 'docusaurus'
  push:
    branches:
      - docusaurus

  # Permite que você rode esta ação manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Docusaurus website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # O diretório que o build gerou. Docusaurus gera na pasta 'build'.
          publish_dir: ./build